<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2b47"/>
      <stop offset="1" stop-color="#0a1424"/>
    </linearGradient>
    <linearGradient id="pillar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2f5fa"/>
      <stop offset="1" stop-color="#c3cfe2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- bollard silhouette -->
  <path d="M 356 764 V 448 A 156 156 0 0 1 668 448 V 764 Q 668 764 638 764 H 386 Q 356 764 356 764 Z" fill="url(#pillar)"/>

  <!-- single green bar: rope wrap = terminal cursor line -->
  <rect x="288" y="536" width="448" height="88" rx="44" fill="#3ddc97" filter="url(#glow)"/>
</svg>
