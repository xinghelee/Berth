name: Berth
options:
  bundleIdPrefix: com.berthssh
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_EMIT_LOC_STRINGS: true

fileGroups:
  - project.yml
  - CLAUDE.md

packages:
  Citadel:
    # 已 vendor 到本地并打补丁:让 RSA 用 rsa-sha2-512 签名(OpenSSH 8.8+ 拒收 Citadel
    # 原生的 SHA-1 ssh-rsa 签名)。基线为 Citadel 0.12.0 + Joannis/swift-nio-ssh 0.3.4。
    # 见 vendor/PATCHES.md。
    path: vendor/Citadel
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    # 1.12+ 引入 Metal GPU 渲染后端(需 Xcode Metal Toolchain,已安装)。
    from: 1.14.0

targets:
  Berth:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Berth
    dependencies:
      - package: Citadel
      - package: SwiftTerm
    scheme:
      configVariants: []
      testTargets:
        - BerthTests
    info:
      path: Berth/Info.plist
      properties:
        CFBundleDisplayName: Berth
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.berthssh.Berth
        SWIFT_VERSION: "5.0"
        # 用稳定的开发证书签名(而非 ad-hoc "-"):ad-hoc 下每次重建二进制指纹都变,
        # Keychain 把新构建当陌生 app,读旧密码项报 errSecAuthFailed(发布用 Developer ID 另签)
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 99LYH6FNPS
        ENABLE_HARDENED_RUNTIME: false
        DEAD_CODE_STRIPPING: true

  BerthTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: BerthTests
    dependencies:
      - target: Berth
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Berth.app/Contents/MacOS/Berth
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 99LYH6FNPS
