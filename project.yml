name: Berth
options:
  bundleIdPrefix: com.berthssh
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    # 0.12.1 将 swift-nio-ssh 依赖切到了第三方个人 fork(Wellz26),供应链风险未评估;
    # 0.12.0 使用维护者(Joannis)fork,PTY API 相同,故锁定 0.12.0。
    exactVersion: 0.12.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    # 1.12.0 起引入 Metal GPU 渲染后端,构建需要 Xcode Metal Toolchain
    # (本机下载该组件被网络阻断)。spike 阶段锁 1.11.2,后续解决网络后再升级。
    exactVersion: 1.11.2

targets:
  Berth:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Berth
    dependencies:
      - package: Citadel
      - package: SwiftTerm
    scheme:
      configVariants: []
    info:
      path: Berth/Info.plist
      properties:
        CFBundleDisplayName: Berth
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.berthssh.Berth
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: false
        DEAD_CODE_STRIPPING: true
