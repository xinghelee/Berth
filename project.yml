name: Berth
options:
  bundleIdPrefix: com.berthssh
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_EMIT_LOC_STRINGS: true

fileGroups:
  - project.yml
  - CLAUDE.md

packages:
  Citadel:
    # 已 vendor 到本地并打补丁:让 RSA 用 rsa-sha2-512 签名(OpenSSH 8.8+ 拒收 Citadel
    # 原生的 SHA-1 ssh-rsa 签名)。基线为 Citadel 0.12.0 + Joannis/swift-nio-ssh 0.3.4。
    # 见 vendor/PATCHES.md。
    path: vendor/Citadel
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    # 1.12+ 引入 Metal GPU 渲染后端(需 Xcode Metal Toolchain,已安装)。
    from: 1.14.0

targets:
  Berth:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Berth
    dependencies:
      - package: Citadel
      - package: SwiftTerm
    scheme:
      configVariants: []
      testTargets:
        - BerthTests
    info:
      path: Berth/Info.plist
      properties:
        CFBundleDisplayName: Berth
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
    entitlements:
      path: Berth/Berth.entitlements
      properties:
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers: [iCloud.com.berthssh.app]
        com.apple.developer.aps-environment: development
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.berthssh.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.berthssh.app
        SWIFT_VERSION: "5.0"
        # 用稳定的开发证书签名(而非 ad-hoc "-"):ad-hoc 下每次重建二进制指纹都变,
        # Keychain 把新构建当陌生 app,读旧密码项报 errSecAuthFailed(发布用 Developer ID 另签)
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 99LYH6FNPS
        ENABLE_HARDENED_RUNTIME: false
        DEAD_CODE_STRIPPING: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # iOS 版:复用 AppKit-free 的 Core(模型/存储/解析/SSH 层),UI 在 BerthiOS/ 重写
  BerthiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BerthiOS
      - path: Berth/Core/Models
      - path: Berth/Core/Storage
      - path: Berth/Core/Parsing
      - path: Berth/Core/SSH/HostSpec.swift
      - path: Berth/Core/SSH/SSHErrorMapper.swift
      - path: Berth/Core/SSH/KnownHostsStore.swift
      - path: Berth/Core/SSH/HostKeyValidation.swift
      - path: Berth/Core/SSH/OpenSSHFormat.swift
      - path: Berth/Core/SSH/SSHConnection.swift
      - path: Berth/Core/SSH/PortForwardService.swift
      - path: Berth/Core/SSH/ProxyConnector.swift
      - path: Berth/Core/SSH/SOCKS5.swift
      - path: Berth/Core/SSH/ServerInfo.swift
      - path: Berth/Core/Services/KeyStore.swift
      - path: Berth/Core/Terminal/TerminalTheme.swift
      - path: Berth/Features/Settings/SettingsKeys.swift
      - path: Berth/Resources
    dependencies:
      - package: Citadel
      - package: SwiftTerm
    info:
      path: BerthiOS/Info.plist
      properties:
        CFBundleDisplayName: Berth
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: BerthiOS/BerthiOS.entitlements
      properties:
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers: [iCloud.com.berthssh.app]
        aps-environment: development
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.berthssh.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.berthssh.ios
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 99LYH6FNPS

  BerthTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: BerthTests
    dependencies:
      - target: Berth
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Berth.app/Contents/MacOS/Berth
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 99LYH6FNPS
